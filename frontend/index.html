<!DOCTYPE html>
<html>
<head>
  <title>Backend Assignment</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .container {
      width: 400px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 5px;
      padding: 8px;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
      cursor: pointer;
      width: 48%;
    }

    button:hover {
      background: #0056b3;
    }

    .btn-group {
      display: flex;
      justify-content: space-between;
    }

    #output {
      background: #111;
      color: #0f0;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      height: 150px;
      overflow: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🔐 Auth</h2>

  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <div class="btn-group">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>

  <h2>📋 Tasks</h2>

  <input id="title" placeholder="Task Title">
  <input id="desc" placeholder="Description">

  <div class="btn-group">
    <button onclick="createTask()">Create</button>
    <button onclick="getTasks()">Fetch</button>
  </div>

  <pre id="output"></pre>
</div>

<script src="script.js"></script>

</body>
</html>
